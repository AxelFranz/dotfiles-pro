theme = "axel"

[editor]
line-number = "relative"
bufferline = "multiple"

[editor.lsp]
auto-signature-help = false

[keys.normal]
esc = ["collapse_selection","keep_primary_selection"]

[keys.insert]
C-space = "signature_help"

[editor.cursor-shape]
insert = "bar"

[editor.inline-diagnostics]
cursor-line = "hint"
